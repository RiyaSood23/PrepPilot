<!DOCTYPE html>
<html>

<head>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="admin.css">
</head>

<body>

<h1>Admin Dashboard</h1>

<!-- ADD COMPANY BUTTON -->

<button onclick="openForm()">Add Company</button>


<!-- ADD COMPANY FORM -->

<div id="form" class="hidden form-box">

<h2>Add Company</h2>

<input id="name" placeholder="Company Name">
<input id="role" placeholder="Role">
<input id="package" placeholder="Package">
<input id="location" placeholder="Location">
<input id="cgpa" placeholder="Minimum CGPA">

<button onclick="addCompany()">Submit</button>
<button onclick="closeForm()">Close</button>

</div>


<br><br>


<!-- SEARCH -->

<input id="search" placeholder="Search company..." onkeyup="searchCompany()">


<h2>Companies</h2>

<div id="companyList"></div>


<!-- DELETE MODAL -->

<div id="deleteModal" class="modal hidden">

<div class="modal-box">

<p>Are you sure you want to delete this company?</p>

<button class="delete" onclick="confirmDelete()">Yes Delete</button>
<button onclick="closeDeleteModal()">Cancel</button>

</div>

</div>


<!-- SUCCESS TOAST -->

<div id="successToast" class="toast hidden">
 Submitted Successfully 
</div>


<script src="admin.js"></script>

</body>

</html>
