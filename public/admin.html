<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepPilot • Admin Portal</title>
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <div onclick="goHome()" class="logo">PrepPilot</div>

            <div class="nav-links">
                <a href="#" onclick="goHome()">Home</a>
                <a href="admin.html" class="active">Admin</a>
                <a href="student.html">Student</a>
                <a href="#" onclick="logout()">Logout</a>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="view-header">
            <div>
                <h1>Admin Dashboard</h1>
                <p>Manage placement companies • Real-time tracking</p>
            </div>

            <button id="add-company-btn" class="new-reg-btn">+ Add Company</button>
        </div>

        <div class="companies-section">
            <div class="section-title">
                <h2>Company Catalog <span id="count">0</span></h2>
            </div>

            <div id="companies-list" class="companies-grid"></div>
        </div>
    </div>

    <div id="add-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Company</h2>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>

            <form id="company-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Company Name</label>
                        <input type="text" id="name" required>
                    </div>

                    <div class="form-group">
                        <label>Role</label>
                        <input type="text" id="role" required>
                    </div>

                    <div class="form-group">
                        <label>Package</label>
                        <input type="text" id="package" required>
                    </div>

                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="location" required>
                    </div>

                    <div class="form-group full">
                        <label>Min CGPA</label>
                        <input type="number" id="min-cgpa" step="0.1" required>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="cancel-btn" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="submit-btn">Add Company</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>

    <script>
        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        function goHome() {
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
