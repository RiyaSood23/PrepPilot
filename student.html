<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlaceTrack • Student Portal</title>
    <link rel="stylesheet" href="student.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div onclick="window.location.href='index.html'" class="logo">PlaceTrack</div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="admin.html">Admin</a>
                <a href="student.html" class="active">Student</a>
            </div>
        </div>
    </nav>

    <div class="student-container">
        <!-- Registration Form -->
        <div id="registration-form" class="registration-box">
            <div class="form-header">
                <h1>Student Registration</h1>
                <p>Register to see your eligible companies</p>
            </div>
            
            <form id="student-register-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="s-name" required placeholder="Aarav Sharma">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Branch</label>
                        <input type="text" id="s-branch" required placeholder="Computer Science">
                    </div>
                    <div class="form-group">
                        <label>CGPA</label>
                        <input type="number" id="s-cgpa" step="0.01" min="0" max="10" required placeholder="8.45">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Skills (comma separated)</label>
                    <input type="text" id="s-skills" required placeholder="Python, DSA, React, Machine Learning">
                </div>
                
                <button type="submit" class="register-btn">Register &amp; View Companies</button>
            </form>
        </div>

        <!-- Companies View -->
        <div id="companies-view" class="companies-view" style="display: none;">
            <div class="view-header">
                <div>
                    <h1>Welcome, <span id="student-name"></span></h1>
                    <p id="student-info"></p>
                </div>
                <button onclick="resetStudent()" class="new-reg-btn">New Registration</button>
            </div>
            
            <div class="eligibility-note">
                <span class="green-dot"></span>
                Green = Eligible  <span class="red-dot"></span> Red = Not Eligible
            </div>
            
            <div id="student-companies-list" class="companies-grid">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <script src="student.js"></script>
</body>
</html>
